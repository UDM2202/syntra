version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - syntra-network

  backend:
    image: python:3.11-alpine
    container_name: syntra-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    command: python app.py
    networks:
      - syntra-network

networks:
  syntra-network:
    driver: bridge